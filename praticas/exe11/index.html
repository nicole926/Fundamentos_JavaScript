<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div.cont{
        background-color: rgba(100, 148, 237, 0.555);
        border-radius: 15px;
        padding: 15px;
        margin-right: auto;
        margin-top: 20px;
        width: 300px;
        box-shadow: 1px 1px rgba(0, 0, 0, 0.404);
    }

    div.calculadora{
        display: flex;
        flex-direction: row;
        gap: 10px;
        align-items: center;
        justify-content: center;
    }

    div.cont h1, p{
        color: midnightblue;
        text-align: center;
    }

    div.cont p{
        font-size: 30px;
        font-weight: bold;
    }

    div.calculadora button{
        width: 50px;
        height: 50px;
    }
</style>
<body>
   <h1 id="titulo">Título original</h1>
   <button id="botao" onclick="clicou()">Clique aqui</button>

   <h1>Digite o que você deseja adicionar na lista: </h1>
   <ul id="lista"></ul>
   <input type="text" id="input">
   <button id="add">Adicionar</button>


    <div class="cont">
        <h1>Contador</h1>
        <div class="calculadora">
            <button id="mais">+</button>
            <p id="contador">0</p>
            <button id="menos">-</button>
        </div>
    </div>


    <input type="text" id="tarefa">
    <button id="adicionar">Adicionar tarefa</button>

    <ul id="listaTarefas"></ul>

    <script src="script.js"></script>
</body>
</html>
